<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Numbers</title>
</head>
<body>
    <h2>add two numbers</h2>
    <input type="number" id="num1" placeholder="put number">
    <input type="number" id="num2" placeholder="put number">

    <button onclick="addNumbers()">Add</button>

    <p id="result"></p>
    <script>
        function addNumbers() {
          let a = Numbers(document.getElementById("num1").value);
          let b = Numbers(document.getElementById("num2").value);
            
          let sum = a + b;

          document.getElementById("result").innerText = "result" + sum
        }
    </script>
</body>
</html>
