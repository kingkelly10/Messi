<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XYZ-COMPANY Currency Exchange</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0b0b3b;
    margin: 0;
    padding: 0;
    color: white;
    text-align: center;
}


.header {
    padding: 30px;
}

.header h1 {
    margin: 0;
    font-size: 28px;
}

.header p {
    margin-top: 10px;
    font-size: 18px;
}


.container {
    background: white;
    color: black;
    width: 70%;
    margin: auto;
    padding: 30px;
    border-radius: 10px;
}


.row {
    display: flex;
    justify-content: space-around;
    margin-top: 20px;
}

.box {
    display: flex;
    flex-direction: column;
    text-align: left;
}

input, select {
    padding: 10px;
    margin-top: 5px;
    width: 150px;
}


button {
    margin-top: 30px;
    padding: 12px 30px;
    background: #0b0b3b;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #1a1a66;
}


.result {
    margin-top: 20px;
    font-size: 22px;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="header">
    <h1>XYZ-COMPANY</h1>
    <p>CURRENCY EXCHANGE PLATFORM</p>
</div>

<div class="container">

    <div class="row">
        <div class="box">
            <label>Amount</label>
            <input type="number" id="amount" value="100">
        </div>

        <div class="box">
            <label>From</label>
            <select id="from">
                <option value="USD">USD - $</option>
                <option value="RWF">Rwanda - RWF</option>
            </select>
        </div>

        <div class="box">
            <label>To</label>
            <select id="to">
                <option value="RWF">Rwanda - RWF</option>
                <option value="USD">USD - $</option>
            </select>
        </div>
    </div>

    <button onclick="convert()">Convert</button>

    <div class="result" id="result">Result: 0</div>

</div>

<script>

const rates = {
    USD: 1,
    RWF: 1300
};

function convert() {
    let amount = document.getElementById("amount").value;
    let from = document.getElementById("from").value;
    let to = document.getElementById("to").value;

    
    let base = amount / rates[from];

    
    let result = base * rates[to];

    
    document.getElementById("result").innerText =
        "Result: " + result.toFixed(0);
}
</script>

</body>
</html>
